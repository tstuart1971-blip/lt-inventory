document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;justify-content:center;padding:20px;z-index:60;animation:ltfade .16s ease;cursor:zoom-out;\" onclick=\"{{ closeLightbox }}\">\n      {{ lightboxEl }}\n      <button onclick=\"{{ closeLightbox }}\" style=\"position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:10px;width:42px;height:42px;font-size:22px;cursor:pointer;line-height:1;\">×<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ scanning }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:#000;z-index:70;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;animation:ltfade .16s ease;\">\n      <video id=\"lt-scan-video\" autoplay=\"\" playsinline=\"\" muted=\"\" style=\"width:100%;max-width:520px;max-height:66vh;object-fit:cover;border-radius:14px;background:#111;\"><\u002Fvideo>\n      <div style=\"color:#fff;font:600 15px 'Plus Jakarta Sans';margin-top:18px;text-align:center;\">Point the camera at a barcode<\u002Fdiv>\n      <div style=\"color:#9fb0c2;font:500 12px 'Plus Jakarta Sans';margin-top:6px;text-align:center;max-width:320px;\">Hold steady — it scans automatically. Price, quantity &amp; photo are always entered by hand.<\u002Fdiv>\n      <button onclick=\"{{ stopScan }}\" style=\"margin-top:20px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:11px;padding:13px 30px;font:700 14px 'Plus Jakarta Sans';cursor:pointer;\">Cancel<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ settingsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(14,40,24,.55);display:flex;align-items:flex-start;justify-content:center;padding:26px 14px;z-index:58;overflow:auto;animation:ltfade .16s ease;\" onclick=\"{{ closeSettings }}\">\n      <div style=\"background:#fff;border-radius:18px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.35);animation:ltpop .2s ease;\" onclick=\"{{ stop }}\">\n        <div style=\"background:linear-gradient(135deg,#0e5730,#1f9d57);border-radius:18px 18px 0 0;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;\">\n          <span style=\"font:800 17px 'Plus Jakarta Sans';color:#fff;\">Settings<\u002Fspan>\n          <button onclick=\"{{ closeSettings }}\" style=\"background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;width:30px;height:30px;font-size:18px;cursor:pointer;line-height:1;\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:18px 20px 22px;display:flex;flex-direction:column;gap:12px;\">\n          <button onclick=\"{{ onExport }}\" style=\"background:#eaf7ef;color:#16783f;border:none;border-radius:11px;padding:13px;font:700 14px 'Plus Jakarta Sans';cursor:pointer;\">Export all to Excel (backup)<\u002Fbutton>\n          <button onclick=\"{{ onImportOld }}\" style=\"background:#f4f2ea;color:#5a5030;border:none;border-radius:11px;padding:13px;font:700 14px 'Plus Jakarta Sans';cursor:pointer;\">Import items from old app (this device)<\u002Fbutton>\n          <button onclick=\"{{ onReload }}\" style=\"background:#f4f2ea;color:#5a5030;border:none;border-radius:11px;padding:13px;font:700 14px 'Plus Jakarta Sans';cursor:pointer;\">Refresh from cloud<\u002Fbutton>\n          <div style=\"font:400 11.5px/1.6 'Plus Jakarta Sans';color:#8a9a8c;border-top:1px solid #f0f2ec;padding-top:12px;\">Your inventory is saved in the cloud and shared across every device that opens this app with your access code. Export regularly as an extra backup.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  SUPA_URL = 'https://kabrauhnmlzrspgdvgcv.supabase.co';\n  SUPA_KEY = 'sb_publishable_gubEtQHzKrwdAfHeCyQRdw_ztMqdzv8';\n  ACCESS_CODE = 'LT2026';\n  BUCKET = 'item-photos';\n  BLANK_PX = 'data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==';\n\n  PRESETS = ['Bath & Body','Men','Women','Kids','Shoes','Accessories','School Supplies','Other'];\n  LOCATIONS = [{value:'Belize',label:'🇧🇿 Belize'},{value:'USA',label:'🇺🇸 USA'}];\n  BRANDS = ['Nike','Adidas','Jordan','Puma','Reebok','New Balance','Converse','Vans','Skechers','Under Armour','Fila','Timberland','Crocs','Champion',\"Levi's\",'Tommy Hilfiger','Ralph Lauren / Polo','Calvin Klein','Guess','Michael Kors (MK)','Coach','Kate Spade','Gucci','Zara','H&M','Old Navy',\"Victoria's Secret\",'Bath & Body Works','Nivea','Dove','Aveeno','Vaseline','Generic / No Brand'];\n  MODELS = ['Japanese Cherry Blossom','Warm Vanilla Sugar','A Thousand Wishes','Into the Night','In the Stars','Mahogany Teakwood','Teakwood','Eucalyptus Spearmint','Champagne Toast','Sweet Pea','Cucumber Melon','Pink Chiffon','Sun-Washed Citrus','Ocean','Gingham','Strawberry Pound Cake','Vanilla Bean Noel','Twisted Peppermint','Fresh Cut Lilacs','Wild Madagascar Vanilla','Bergamot Waters','Black Cherry Merlot','Rose Water & Ivy','Sea Salt & Sandalwood',\"You're the One\",'Peach Bellini','Kobe','Jordan','LeBron','Kevin Durant (KD)','Kyrie','Curry','Yeezy','Air Force 1','Air Max','Dunk','Blazer','Ultraboost','Superstar','Stan Smith','Gazelle','Samba','Chuck Taylor','Old Skool'];\n  TYPES = ['Fine Fragrance Mist','Body Wash & Foam','Foaming Hand Soap','Gentle Hand Soap','Hand Sanitizer (PocketBac)','3-Wick Candle','Single Wick Candle','Wallflowers Fragrance Refill','Wallflowers Plug','Room Spray','Car Fragrance','Body Wash','Body Lotion','Body Cream','Body Butter','Body Oil','Body Scrub','Body Mist','Perfume / Fragrance','Shampoo','Conditioner','Lip Balm','Deodorant','Bar Soap',\"Men's T-Shirt\",\"Men's Polo Shirt\",\"Men's Jeans\",\"Men's Shorts\",\"Men's Hoodie\",\"Women's Top\",\"Women's Dress\",\"Women's Jeans\",\"Women's Leggings\",\"Kids T-Shirt\",\"Kids Dress\",\"Baby Onesie\",'Sneakers','Sandals / Flip-Flops','Boots','Heels','Handbag / Purse','Backpack','Wallet','Hat / Cap','Jewelry','Watch','Sunglasses','Notebook','Pens','School Bag / Backpack','Other'];\n  SIZES = ['XS','S','M','L','XL','XXL','XXXL','One Size','US 5','US 6','US 7','US 8','US 8.5','US 9','US 9.5','US 10','US 10.5','US 11','US 12','US 13','US 14','2 oz','4 oz','8 oz','12 oz','16 oz','250 ml','500 ml'];\n  COLORS = ['Black','White','Gray','Navy','Blue','Light Blue','Royal Blue','Red','Maroon','Pink','Hot Pink','Purple','Green','Olive','Yellow','Orange','Brown','Tan / Beige','Gold','Silver','Multi-Color'];\n  STORES = [\"Macy's\",'Nordstrom','Nordstrom Rack','Ross','Burlington','TJ Maxx','Marshalls','JCPenney',\"Kohl's\",'Nike','Nike Outlet','Adidas','Foot Locker','Finish Line',\"Dillard's\",'Old Navy','Gap','H&M','Zara','Target','Walmart','Amazon','SHEIN',\"Victoria's Secret\",'Bath & Body Works','Ulta','Sephora','Costco',\"Sam's Club\",'Wholesale / Supplier'];\n\n  state = {\n    locked: true, codeInput: '', gateErr: false,\n    items: [], loading: false, toast: '', toastKind: 'ok',\n    search: '', filter: 'All',\n    modalOpen: false, editingId: null, detailId: null, lightbox: '', settingsOpen: false, scanning: false,\n    draft: this.blankDraft(),\n  };\n\n  blankDraft() {\n    return { name:'', location:'Belize', category:'', brand:'', model:'', ptype:'', size:'', color:'', cost:'', price:'', qty:'', sku:'', supplier:'', notes:'', onsale:false, origprice:'', photo:'', photoChanged:false };\n  }\n\n  componentDidMount() {\n    let unlocked = false;\n    try { unlocked = localStorage.getItem('lt_cloud_unlocked') === '1'; } catch (e) {}\n    this.initClient();\n    if (unlocked) { this.setState({ locked:false }); this.loadItems(); }\n  }\n\n  initClient() {\n    if (this.sb) return true;\n    if (window.supabase && window.supabase.createClient) {\n      this.sb = window.supabase.createClient(this.SUPA_URL, this.SUPA_KEY);\n      return true;\n    }\n    return false;\n  }\n\n  flash(msg, kind) {\n    this.setState({ toast: msg, toastKind: kind || 'ok' });\n    clearTimeout(this._toastT);\n    this._toastT = setTimeout(() => this.setState({ toast: '' }), 3200);\n  }\n\n  onCode = (e) => this.setState({ codeInput: e.target.value, gateErr:false });\n  onCodeKey = (e) => { if (e.key === 'Enter') this.onUnlock(); };\n  onUnlock = () => {\n    if (this.state.codeInput.trim().toUpperCase() === this.ACCESS_CODE) {\n      try { localStorage.setItem('lt_cloud_unlocked', '1'); } catch (e) {}\n      this.setState({ locked:false, gateErr:false, codeInput:'' });\n      if (!this.initClient()) setTimeout(() => this.initClient(), 500);\n      this.loadItems();\n    } else {\n      this.setState({ gateErr:true });\n    }\n  };\n\n  async loadItems() {\n    if (!this.initClient()) {\n      this.setState({ loading:true });\n      setTimeout(() => this.loadItems(), 700);\n      return;\n    }\n    this.setState({ loading:true });\n    try {\n      const { data, error } = await this.sb.from('items').select('*').order('created_at', { ascending:false });\n      if (error) throw error;\n      this.setState({ items: data || [], loading:false });\n    } catch (e) {\n      this.setState({ loading:false });\n      this.flash('Could not reach the cloud — check internet, then tap ⚙ → Refresh.', 'err');\n    }\n  }\n  onReload = () => { this.setState({ settingsOpen:false }); this.loadItems(); };\n\n  num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }\n  cur() { return 'BZD $'; }\n  fmt(n) { return this.cur() + ' ' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 }); }\n  threshold() { return 3; }\n\n  resizeImage(file) {\n    return new Promise((resolve) => {\n      const reader = new FileReader();\n      reader.onload = () => {\n        const raw = typeof reader.result === 'string' ? reader.result : '';\n        if (!raw) { resolve(''); return; }\n        const img = new Image();\n        let settled = false;\n        const finish = (v) => { if (!settled) { settled = true; resolve(v); } };\n        img.onload = () => {\n          try {\n            const w0 = img.naturalWidth || img.width, h0 = img.naturalHeight || img.height;\n            if (!w0 || !h0) return finish(raw);\n            const max = 900; let w = w0, h = h0;\n            if (w > h && w > max) { h = Math.round(h * max / w); w = max; }\n            else if (h > max) { w = Math.round(w * max / h); h = max; }\n            const c = document.createElement('canvas'); c.width = w; c.height = h;\n            c.getContext('2d').drawImage(img, 0, 0, w, h);\n            const out = c.toDataURL('image/jpeg', 0.78);\n            finish(out && out.length > 200 ? out : raw);\n          } catch (e) { finish(raw); }\n        };\n        img.onerror = () => finish(raw);\n        img.src = raw;\n        setTimeout(() => finish(raw), 4000);\n      };\n      reader.onerror = () => resolve('');\n      reader.readAsDataURL(file);\n    });\n  }\n  dataURLtoBlob(dataURL) {\n    try {\n      const parts = dataURL.split(','); const mime = (parts[0].match(/:(.*?);/) || [])[1] || 'image/jpeg';\n      const bin = atob(parts[1]); const len = bin.length; const arr = new Uint8Array(len);\n      for (let i = 0; i < len; i++) arr[i] = bin.charCodeAt(i);\n      return new Blob([arr], { type: mime });\n    } catch (e) { return null; }\n  }\n  async uploadPhoto(dataURL) {\n    const blob = this.dataURLtoBlob(dataURL);\n    if (!blob) return '';\n    const path = Date.now() + '-' + Math.floor(Math.random() * 1e6) + '.jpg';\n    const { error } = await this.sb.storage.from(this.BUCKET).upload(path, blob, { contentType:'image/jpeg', upsert:false });\n    if (error) throw error;\n    const { data } = this.sb.storage.from(this.BUCKET).getPublicUrl(path);\n    return data.publicUrl;\n  }\n\n  setDraft(k, v) { this.setState((s) => ({ draft: { ...s.draft, [k]: v } })); }\n  onPhoto = async (e) => {\n    const input = e.target; const f = input.files && input.files[0]; input.value = '';\n    if (!f) return;\n    const url = await this.resizeImage(f);\n    if (!url) { alert('Sorry, that photo could not be read. Please try another one.'); return; }\n    this.setState((s) => ({ draft: { ...s.draft, photo:url, photoChanged:true } }));\n  };\n\n  componentWillUnmount() { if (this._reader) { try { this._reader.reset(); } catch (e) {} } }\n  startScan = () => {\n    if (!(window.ZXing && window.ZXing.BrowserMultiFormatReader)) { this.flash('Scanner still loading — try again in a second.', 'err'); return; }\n    this.setState({ scanning:true });\n    setTimeout(() => {\n      const video = document.getElementById('lt-scan-video');\n      if (!video) return;\n      video.setAttribute('playsinline', ''); video.setAttribute('muted', '');\n      try {\n        this._reader = new window.ZXing.BrowserMultiFormatReader();\n        this._reader.decodeFromConstraints({ video: { facingMode: { ideal:'environment' } } }, video, (result) => {\n          if (result) this.onScanResult(result.getText());\n        });\n      } catch (e) { this.setState({ scanning:false }); alert('Could not start the camera. Please allow camera access in your browser.'); }\n    }, 300);\n  };\n  stopScan = () => {\n    if (this._reader) { try { this._reader.reset(); } catch (e) {} this._reader = null; }\n    this.setState({ scanning:false });\n  };\n  async lookupBarcode(code) {\n    const tryOFF = async (base) => {\n      try {\n        const r = await fetch(base + '/api/v0/product/' + encodeURIComponent(code) + '.json');\n        const j = await r.json();\n        if (j && j.status === 1 && j.product) {\n          const p = j.product;\n          const name = p.product_name || p.product_name_en || p.generic_name || '';\n          const brand = (p.brands || '').split(',')[0].trim();\n          if (name || brand) return { name, brand };\n        }\n      } catch (e) {}\n      return null;\n    };\n    // Beauty/personal-care first (best for bath & body), then food, then general retail.\n    let res = await tryOFF('
